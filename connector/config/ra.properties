# Mainframe Resource Adapter Configuration
# Vendor: Apex Consulting
# Version: connector-1.0
#
# These settings configure the JCA resource adapter's connection
# to the back-office CICS/COBOL EIS.
#
# In production, set eis.host and eis.port to the mainframe
# CICS Transaction Gateway address. In demo/embedded mode,
# the adapter will fall back to JDBC queries against the
# CLIENTS table automatically.

eis.host=localhost
eis.port=3270
eis.transaction.program=ACCT-INQ
eis.connection.timeout.ms=3000
eis.enabled=true
