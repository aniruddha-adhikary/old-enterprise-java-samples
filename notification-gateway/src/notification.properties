# BigCorp Notification Gateway Configuration
# Last updated: 2002-03-20
#
# NOTE: For development, set dev.mode=true to skip actual SMTP/SMS
# delivery and just log the messages to console.

# --- SMTP Configuration ---
# The internal relay at smtp-internal.bigcorp.com is unreliable
# during market close (5:00-5:30 PM EST). Use localhost for dev.
smtp.host=localhost
smtp.port=25
smtp.from=noreply@bigcorp.com

# HTML email support (added for sales team, 2001)
email.html.enabled=true

# --- SMS Gateway Configuration ---
# Vendor switched in 2001 from TelcoSMS to MessageDirect
# but the XML format stayed the same (thankfully)
sms.gateway.url=
sms.gateway.apikey=REPLACE_WITH_ACTUAL_KEY
sms.connect.timeout=5000
sms.read.timeout=10000

# --- Retry Configuration ---
# Max retries before marking as FAILED
retry.max.count=3
# Retry delay is handled by the queue re-delivery mechanism

# --- Development Mode ---
# Set to true to skip actual email/SMS delivery
# (messages will be logged to console instead)
dev.mode=true
