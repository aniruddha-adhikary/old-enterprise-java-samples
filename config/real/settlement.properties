# Settlement Gateway Configuration - Real Infrastructure
# Real SFTP server (standing in for clearinghouse SFTP)
#
# Requires: SFTP server running on localhost:2222
# Start with: docker run -d --name bigcorp-sftp -p 2222:22 \
#   -e SFTP_USERS=bigcorp_settle:settle_pass:::incoming,outgoing \
#   atmoz/sftp:alpine

sftp.host=localhost
sftp.port=2222
sftp.username=bigcorp_settle
sftp.password=settle_pass
sftp.remote.dir=/incoming/
sftp.remote.inbound.dir=/outgoing/

# Output directory for generated settlement files
settlement.output.dir=./sftp-outbound/

# Batch processing settings
batch.interval.ms=60000
