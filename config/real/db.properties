# Database configuration - Real Infrastructure
# Oracle XE 21c (standing in for Oracle 8i in production)
#
# Requires: Oracle XE running on localhost:1521
# Start with: docker run -d --name bigcorp-oracle -p 1521:1521 \
#   -e ORACLE_PASSWORD=bigcorp_2002 \
#   -e APP_USER=bigcorp_app -e APP_USER_PASSWORD=bigcorp_2002 \
#   gvenzl/oracle-xe:21-slim

db.driver=oracle.jdbc.OracleDriver
db.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
db.username=bigcorp_app
db.password=bigcorp_2002
