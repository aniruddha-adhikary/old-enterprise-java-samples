# MQ Configuration - Real Infrastructure
# Standalone ActiveMQ broker over TCP (standing in for IBM MQSeries)
#
# Requires: ActiveMQ running on localhost:61616
# Start with: docker run -d --name bigcorp-activemq -p 61616:61616 \
#   -p 8161:8161 rmohr/activemq:5.15.9-alpine
# Admin console: http://localhost:8161/admin (admin/admin)

mq.broker.url=tcp://localhost:61616
