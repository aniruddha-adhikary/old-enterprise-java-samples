# Settlement Gateway Configuration
# Last updated: 2002-05-20

# SFTP settings for clearinghouse connection
# In production, the password comes from the credential store
# (ask the Unix admin for access, ref: CHG-2001-0445)
sftp.host=
sftp.port=22
sftp.username=bigcorp_settle
sftp.password=
sftp.remote.dir=/incoming/settlements/
sftp.remote.inbound.dir=/outgoing/reconciliation/

# Output directory for generated settlement files
# Files are written here before SFTP upload
settlement.output.dir=./sftp-outbound/

# Batch processing settings
# interval is in milliseconds (60000 = 1 minute, for demo only)
# In production the batch runs at 6 PM via cron, not via this timer
batch.interval.ms=60000

# Partial batch mode (JIRA-2890 - not fully implemented)
# batch.partial.enabled=false
# batch.partial.size=100
